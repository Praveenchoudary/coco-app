<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="100%" stop-color="#b2ebf2"/>
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.94)"/>
      <stop offset="30%" stop-color="rgba(224,247,250,0.76)"/>
      <stop offset="70%" stop-color="rgba(178,235,242,0.68)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.90)"/>
    </linearGradient>
    <linearGradient id="liq" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(178,235,242,0.72)"/>
      <stop offset="100%" stop-color="rgba(0,188,212,0.58)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg3)"/>
  <ellipse cx="245" cy="358" rx="72" ry="14" fill="rgba(0,0,0,0.12)"/>
  <!-- glass -->
  <path d="M185,108 L170,348 Q170,362 185,362 L305,362 Q320,362 320,348 L305,108 Z" fill="url(#glass)" stroke="rgba(255,255,255,0.75)" stroke-width="2"/>
  <!-- liquid -->
  <path d="M188,148 L174,348 Q174,358 187,358 L303,358 Q316,358 316,348 L302,148 Z" fill="url(#liq)" opacity="0.64"/>
  <!-- bubbles -->
  <circle cx="218" cy="275" r="6" fill="rgba(255,255,255,0.70)"/>
  <circle cx="258" cy="248" r="4.5" fill="rgba(255,255,255,0.62)"/>
  <circle cx="288" cy="305" r="5.5" fill="rgba(255,255,255,0.66)"/>
  <circle cx="232" cy="325" r="3.5" fill="rgba(255,255,255,0.60)"/>
  <circle cx="275" cy="340" r="4" fill="rgba(255,255,255,0.68)"/>
  <!-- glass shine -->
  <path d="M192,120 L186,318" stroke="rgba(255,255,255,0.58)" stroke-width="9" stroke-linecap="round"/>
  <!-- coconut half -->
  <ellipse cx="108" cy="195" rx="72" ry="55" fill="#4caf50"/>
  <ellipse cx="108" cy="178" rx="60" ry="42" fill="#a5d6a7"/>
  <ellipse cx="108" cy="168" rx="40" ry="28" fill="#e8f5e9"/>
  <path d="M62,170 Q108,148 154,170" stroke="#2e7d32" stroke-width="2.5" fill="none"/>
  <path d="M68,190 Q108,175 148,190" stroke="#388e3c" stroke-width="1.5" fill="none"/>
  <!-- straw -->
  <rect x="268" y="85" width="8" height="130" rx="4" fill="#ff8a65" opacity="0.85"/>
  <ellipse cx="272" cy="88" rx="7" ry="4" fill="#ff7043" opacity="0.85"/>
</svg>
