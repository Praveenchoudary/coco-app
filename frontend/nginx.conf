server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA routing - all frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy - works in BOTH Docker Compose and Kubernetes
    # In Docker: 'backend' resolves to the backend container
    # In K8s: 'backend' resolves to the backend ClusterIP Service
    location /api/ {
        proxy_pass         http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        # Handle errors gracefully
        proxy_intercept_errors off;
    }

    # Cache static assets (JS, CSS, images built into React)
    location ~* \.(js|css|png|svg|ico|jpg|jpeg|gif|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check endpoint for K8s probes
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml;
}
