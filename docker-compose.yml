
services:
  mysql:
    image: mysql:8.0
    container_name: coconut-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: coconut123
      MYSQL_DATABASE: coconut_store
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pcoconut123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  backend:
    build: ./backend
    container_name: coconut-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: coconut123
      DB_NAME: coconut_store
      PORT: 5000
      JWT_SECRET: coconutsecret2024_superSecure!
      # ── Razorpay (replace with your keys to go live) ──
      RZP_KEY_ID: rzp_test_CHANGE_ME
      RZP_KEY_SECRET: CHANGE_ME
      RZP_WEBHOOK_SECRET: CHANGE_ME
      # ── UPI QR details ────────────────────────────────
      UPI_ID: yourname@upi
      UPI_NAME: NatuCoconut
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_RZP_KEY_ID: rzp_test_CHANGE_ME
    container_name: coconut-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:
