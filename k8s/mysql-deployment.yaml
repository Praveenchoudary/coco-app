# ── PersistentVolumeClaim ─────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# ── ConfigMap with correct SQL schema ────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-scripts
  namespace: default
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS coconut_store
      CHARACTER SET utf8mb4
      COLLATE utf8mb4_unicode_ci;
    
    USE coconut_store;
    
    -- Users table
    CREATE TABLE IF NOT EXISTS users (
      id         INT AUTO_INCREMENT PRIMARY KEY,
      name       VARCHAR(100) NOT NULL,
      mobile     VARCHAR(15) NOT NULL UNIQUE,
      password   VARCHAR(255) NOT NULL,
      role       ENUM('customer','admin') DEFAULT 'customer',
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
    
    -- Products table
    CREATE TABLE IF NOT EXISTS products (
      id           INT AUTO_INCREMENT PRIMARY KEY,
      name         VARCHAR(150) NOT NULL,
      description  TEXT,
      price        DECIMAL(10,2) NOT NULL,
      bulk_price   DECIMAL(10,2),
      unit         VARCHAR(40) NOT NULL,
      min_qty      INT DEFAULT 3,
      bulk_min_qty INT DEFAULT 100,
      stock        INT DEFAULT 200,
      image_url    VARCHAR(255),
      category     VARCHAR(50),
      is_bulk      TINYINT(1) DEFAULT 0,
      created_at   TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
    
    -- Orders table — NO FK on user_id (validated in application code)
    CREATE TABLE IF NOT EXISTS orders (
      id                   INT AUTO_INCREMENT PRIMARY KEY,
      user_id              INT NOT NULL,
      total_amount         DECIMAL(10,2) NOT NULL,
      order_type           ENUM('normal','bulk') DEFAULT 'normal',
      event_name           VARCHAR(200),
      event_date           DATE,
      delivery_name        VARCHAR(100) NOT NULL,
      delivery_mobile      VARCHAR(15) NOT NULL,
      delivery_address     TEXT NOT NULL,
      delivery_city        VARCHAR(100) NOT NULL,
      delivery_district    VARCHAR(100) NOT NULL,
      delivery_pincode     VARCHAR(10) NOT NULL,
      payment_status       ENUM('pending','paid','failed') DEFAULT 'pending',
      payment_method       VARCHAR(50) DEFAULT 'cod',
      payment_ref          VARCHAR(100),
      order_status         ENUM('placed','processing','shipped','delivered','cancelled') DEFAULT 'placed',
      special_instructions TEXT,
      created_at           TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      INDEX idx_user_id (user_id),
      INDEX idx_order_status (order_status),
      INDEX idx_created_at (created_at)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
    
    -- Order items — FK to orders and products kept (these are safe)
    CREATE TABLE IF NOT EXISTS order_items (
      id         INT AUTO_INCREMENT PRIMARY KEY,
      order_id   INT NOT NULL,
      product_id INT NOT NULL,
      quantity   INT NOT NULL,
      price      DECIMAL(10,2) NOT NULL,
      FOREIGN KEY (order_id)   REFERENCES orders(id)   ON DELETE CASCADE,
      FOREIGN KEY (product_id) REFERENCES products(id) ON DELETE RESTRICT
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
    
    -- Admin user (password: admin123)
    INSERT IGNORE INTO users (name, mobile, password, role) VALUES
    ('Admin', '9999999999', '$2b$10$92IXUNpkjO0rOQ5byMi.Ye4oKoEa3Ro9llC/.og/at2.uheWG/igi', 'admin');
    
    -- 6 products
    INSERT IGNORE INTO products
      (name, description, price, bulk_price, unit, min_qty, bulk_min_qty, stock, image_url, category, is_bulk)
    VALUES
