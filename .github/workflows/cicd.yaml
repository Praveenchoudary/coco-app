name: Production CI/CD (Single Repo + ArgoCD)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_USERNAME: praveen22233
  FRONTEND_IMAGE: praveen22233/frontend
  BACKEND_IMAGE: praveen22233/backend

jobs:
  build-test-push-update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Image Tag
        id: tag
        run: |
          TAG=${GITHUB_SHA::7}
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Generated tag: $TAG"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------- FRONTEND BUILD --------
      - name: Build Frontend Image
        run: |
          docker build -t $FRONTEND_IMAGE:$TAG ./frontend

      - name: Push Frontend Image
        run: |
          docker push $FRONTEND_IMAGE:$TAG

      # -------- BACKEND BUILD --------
      - name: Build Backend Image
        run: |
          docker build -t $BACKEND_IMAGE:$TAG ./backend

      - name: Push Backend Image
        run: |
          docker push $BACKEND_IMAGE:$TAG

      # -------- UPDATE K8S MANIFESTS --------
      - name: Update Frontend Deployment Image
        run: |
          sed -i "s|image: .*frontend:.*|image: $FRONTEND_IMAGE:$TAG|g" k8s/frontend-deployment.yaml

      - name: Update Backend Deployment Image
        run: |
          sed -i "s|image: .*backend:.*|image: $BACKEND_IMAGE:$TAG|g" k8s/backend-deployment.yaml

      - name: Show Updated Manifests
        run: |
          echo "Frontend Deployment:"
          cat k8s/frontend-deployment.yaml
          echo "-------------------------"
          echo "Backend Deployment:"
          cat k8s/backend-deployment.yaml

      - name: Commit and Push Updated Manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/
          git commit -m "Update images to $TAG [skip ci]" || echo "No changes to commit"
          git push
